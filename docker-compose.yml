services:
  # ─── Ollama LLM-Dienste ─────────────────────────────────────────────────────
  # Diese Services sind ausschließlich für lokale LLM-Funktionen in diesem
  # Projekt vorgesehen und nicht für den allgemeinen Einsatz gedacht.
  #
  # Modell ändern: OLLAMA_MODEL=<modellname> in der .env-Datei setzen,
  #   z.B. OLLAMA_MODEL=llama3.2:1b  (Default: qwen2.5:0.5b)
  #
  # Speicherpfad/Volume ändern: OLLAMA_DATA_PATH=/pfad/zum/verzeichnis in
  #   .env setzen. Ohne diese Variable wird das Docker-Volume "ollama_data"
  #   verwendet.
  ollama:
    image: ollama/ollama:latest  # CPU-only: keine GPU-Geräte eingebunden
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      # Modelldaten; Host-Pfad über OLLAMA_DATA_PATH steuerbar
      # (Default: Docker-Volume "ollama_data")
      - ${OLLAMA_DATA_PATH:-ollama_data}:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ollama-init lädt das Modell beim ersten Start über die Ollama HTTP-API.
  # Nutzt ein schlankes curl-Image; keine zusätzliche Logik im ollama-Container.
  ollama-init:
    image: curlimages/curl:latest
    restart: on-failure
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:0.5b}
    command:
      - sh
      - -c
      - 'curl -fS -X POST http://ollama:11434/api/pull -H "Content-Type: application/json" -d "{\"name\":\"$$OLLAMA_MODEL\"}" && echo "Modell geladen: $$OLLAMA_MODEL" || echo "Modell-Pull fehlgeschlagen: $$OLLAMA_MODEL"'

  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iot_plant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iot_plant"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "npx prisma db push && node dist/src/main.js"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/iot_plant?schema=public
      # Set MQTT_BROKER_URL to the address of your MQTT broker on the Raspberry Pi,
      # e.g. mqtt://192.168.178.40:1883
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-mqtt://192.168.178.40:1883}
      CORS_ORIGIN: "http://localhost"
      OLLAMA_CHAT_ENDPOINT: ${OLLAMA_CHAT_ENDPOINT:-http://ollama:11434/api/chat}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:0.5b}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Uncomment to run Prisma Studio for database inspection:
  # prisma-studio:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   command: npx prisma studio --port 5555
  #   depends_on:
  #     - db
  #   ports:
  #     - "5555:5555"
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@db:5432/iot_plant?schema=public

volumes:
  pgdata:
  # Persistenter Speicher für Ollama-Modelldaten.
  # Host-Pfad über OLLAMA_DATA_PATH in der .env-Datei überschreibbar.
  ollama_data:
