<svg xmlns="http://www.w3.org/2000/svg" width="200" height="140" viewBox="0 0 200 140">
  <!-- Modulrahmen -->
  <rect x="5" y="10" rx="10" ry="10" width="190" height="120"
        fill="#fdfdfd" stroke="#007acc" stroke-width="3"/>

  <!-- Werkstückbahn / Tisch -->
  <rect x="25" y="80" width="150" height="16"
        fill="#f5f5f5" stroke="#777777" stroke-width="2"/>

  <!-- Stempel-Gehäuse von oben -->
  <rect x="70" y="30" width="60" height="30" rx="6"
        fill="#e6f0ff" stroke="#007acc" stroke-width="2"/>

  <!-- Stempelkolben -->
  <line x1="100" y1="60" x2="100" y2="80"
        stroke="#007acc" stroke-width="4"/>

  <!-- Stempelplatte -->
  <rect x="88" y="80" width="24" height="10" rx="3"
        fill="#007acc"/>
</svg>
