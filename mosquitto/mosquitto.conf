persistence true
persistence_location /mosquitto/data/

# Achtung: Für lokale Entwicklung erlaubt, für Produktion Auth/TLS aktivieren!
allow_anonymous true

log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice

listener 1883

listener 9001
protocol websockets

# WebSocket für lokale Entwicklung aktiviert. Für produktive Szenarien sollten
# Authentifizierung und TLS ergänzt werden.
