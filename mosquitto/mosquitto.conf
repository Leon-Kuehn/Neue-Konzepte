# Mosquitto MQTT Broker Configuration
# ─────────────────────────────────────
# Listener 1: plain MQTT (used by the NestJS backend inside the Docker network)
listener 1883
protocol mqtt

# Listener 2: WebSocket (used by the React frontend running in the browser)
listener 9001
protocol websockets

# Allow unauthenticated connections (suitable for a private lab/dev network).
# Set allow_anonymous false and configure password_file for production use.
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type all
