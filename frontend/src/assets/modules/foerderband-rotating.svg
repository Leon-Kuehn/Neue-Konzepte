        fill="#FACC15" stroke="#F59E0B" stroke-width="4" />
  <!-- Segmente -->
  <g stroke="#F59E0B" stroke-width="3">
    <line x1="40" y1="30" x2="80" y2="30" />
    <line x1="40" y1="60" x2="80" y2="60" />
    <line x1="40" y1="90" x2="80" y2="90" />
    <line x1="40" y1="120" x2="80" y2="120" />
    <line x1="40" y1="150" x2="80" y2="150" />
    <line x1="40" y1="180" x2="80" y2="180" />
  </g>
  <!-- Dreh‑Kreis -->
  <circle cx="60" cy="100" r="40"
          fill="none" stroke="#E11E26" stroke-width="4" />
